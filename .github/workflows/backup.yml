name: Auto Backup

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

jobs:
  backup:
    name: Database Backup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create backup
        run: |
          BACKUP_DIR="backups"
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          mkdir -p $BACKUP_DIR

          if [ -f "data/ozion.db" ]; then
            cp data/ozion.db "$BACKUP_DIR/ozion_backup_$TIMESTAMP.db"
            echo "✅ Backup criado: ozion_backup_$TIMESTAMP.db"
          else
            echo "⚠️ Banco não encontrado, criando backup vazio"
            touch "$BACKUP_DIR/ozion_backup_$TIMESTAMP.db"
          fi

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: backups/*.db
          retention-days: 30

      - name: Cleanup old backups
        run: |
          BACKUP_DIR="backups"
          find $BACKUP_DIR -name "*.db" -mtime +30 -delete 2>/dev/null || true
          echo "✅ Backups antigos removidos"
